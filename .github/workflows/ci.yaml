name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

      - name: Check the sample dataset is reproducible
        run: |
          python scripts/gen_data.py
          git diff --exit-code docs/data/faers_sample.json

      - name: Build Docker image
        run: docker build -t vigiview:ci .
